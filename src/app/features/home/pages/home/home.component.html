<div class="home-container">
  <div class="content">
    
    @if (loading() && lists().length === 0) {
      <div class="loading-state">
        <mat-icon class="empty-icon">shopping_cart</mat-icon>
        <app-loading-spinner [type]="'bar'"></app-loading-spinner>
      </div>
    }

    @if (isEmpty()) {
      <div class="empty-state">
        <mat-icon class="empty-icon">shopping_cart</mat-icon>
        <h2>Nenhuma lista criada</h2>
        <p>Crie sua primeira lista de compras para começar</p>
        <button mat-flat-button color="primary" (click)="createList()">
          Criar primeira lista
        </button>
      </div>
    }

    @if (lists().length > 0) {
      <app-infinite-scroll
        [isLoading]="loading()"
        [isLastPage]="isLastPage()"
        (scrolledToEnd)="loadLists()"
      >
        <app-lista-card-grid
          [lists]="lists()"
          (editList)="editList($event)"
          (startShopping)="iniciarCompra($event)"
        >
        </app-lista-card-grid>
      </app-infinite-scroll>
    }
  </div>

  @if (lists().length > 0) {
    <app-fab-button
      (fabClick)="createList()"
      [icon]="'add'"
      [ariaLabel]="'Criar nova lista'">
    </app-fab-button>
  }
</div>
