<div class="item-list-cards">
  @for (item of items(); track item.id) {
    <mat-card class="item-card" [class.selected]="isSelected(item.id!)">
      <div class="selection-container">
        <mat-checkbox 
          [checked]="isSelected(item.id!)"
          (change)="toggle(item.id!)"
          color="primary"
        ></mat-checkbox>
      </div>
      
      <div class="card-body">
        <mat-card-header>
          <mat-card-title>{{ item.itemOferta.item.nome || 'Produto sem nome' }}</mat-card-title>
          <mat-card-subtitle>
            {{ item.itemOferta.vendedor.nome }}
          </mat-card-subtitle>
        </mat-card-header>
        
        <mat-card-content class="card-content-flex">
          <div class="item-details">
            <p class="item-price">
              {{ item.itemOferta.preco | currency : "BRL" }}
            </p>
            @if (item.itemOferta.hasPromocaoAtiva) {
              <span class="promo-badge">PROMO</span>
            }
          </div>

          <div class="quantity-controls">
            <button mat-icon-button (click)="decrement(item)" [disabled]="item.quantidade <= 0">
              <mat-icon>remove</mat-icon>
            </button>
            <span class="qty-number">{{ item.quantidade }}</span>
            <button mat-icon-button (click)="increment(item)">
              <mat-icon>add</mat-icon>
            </button>
            
            <button mat-icon-button color="warn" class="btn-remove" (click)="remove(item)">
              <mat-icon>delete_outline</mat-icon>
            </button>
          </div>
        </mat-card-content>
      </div>
    </mat-card>
  } @empty {
    <div class="empty-message-container">
      <p class="empty-message">Nenhum item adicionado à lista.</p>
    </div>
  }
</div>
