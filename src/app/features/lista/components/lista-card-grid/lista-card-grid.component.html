<div class="lists-grid">
  <mat-card *ngFor="let list of lists()" class="list-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title class="card-title-container">
        <span>{{ list.nome }}</span>
        <mat-icon
          *ngIf="list.statusLista === 'FINALIZADA'"
          class="status-icon"
          color="primary"
          >check_circle</mat-icon
        >
      </mat-card-title>
      <mat-card-subtitle>
        Criada em {{ list.createdDate | date:'dd/MM/yyyy' }}
      </mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <div class="list-info">
        <div class="info-item total">
          <span class="currency">R$</span>
          <span class="value">{{ list.valorTotal | number:'1.2-2' }}</span>
        </div>
        <div class="info-item count">
          <mat-icon>inventory_2</mat-icon>
          <span>{{ list.totalItens }} itens</span>
        </div>
      </div>
    </mat-card-content>

    <mat-card-actions align="end">
      <button
        mat-button
        *ngIf="list.statusLista !== 'FINALIZADA'"
        (click)="onEditList(list.id)"
      >
        <mat-icon>edit</mat-icon>
        Editar
      </button>

      @if (list.statusLista !== 'FINALIZADA') {
        <button
          mat-flat-button
          color="primary"
          (click)="onStartShopping(list)"
        >
          <mat-icon>shopping_cart</mat-icon>
          Comprar
        </button>
      } @else {
        <button
          mat-stroked-button
          color="primary"
          (click)="onViewPurchase(list.id)"
        >
          <mat-icon>visibility</mat-icon>
          Ver
        </button>
      }
    </mat-card-actions>
  </mat-card>
</div>
