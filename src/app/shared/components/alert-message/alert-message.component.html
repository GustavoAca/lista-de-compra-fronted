<mat-card [class]="'alert-card ' + type()">
  <mat-card-content class="alert-content">
    <mat-icon [color]="type() === 'error' ? 'warn' : 'primary'">{{ icon() }}</mat-icon>
    <div class="message-text">{{ message() }}</div>
    
    @if (showCloseButton()) {
      <button mat-icon-button (click)="onClose()">
        <mat-icon>close</mat-icon>
      </button>
    }
  </mat-card-content>
</mat-card>
