<div class="loading-overlay">
  @if (type() === 'spinner') {
    <mat-spinner
      [diameter]="diameter()"
      class="spinner"
      [color]="color()"
    ></mat-spinner>
  }

  @if (type() === 'bar') {
    <div class="progress-wrapper">
      <mat-progress-bar mode="query" [color]="color()"></mat-progress-bar>
    </div>
  }
</div>
